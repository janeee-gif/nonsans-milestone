<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NONSANS Milestone</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #000; --text: #fff; --gray: #888; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Pretendard', sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 60px 20px; }
        .logo-wrapper { width: 60px; margin-bottom: 15px; text-align: center; }
        .logo-wrapper img { width: 100%; height: auto; border-radius: 8px; }
        .milestone-title { font-size: 0.7rem; letter-spacing: 5px; color: var(--gray); margin-bottom: 40px; font-weight: 300; }
        
        .counter-section { text-align: center; margin-bottom: 60px; }
        #display-count { font-size: 4.5rem; font-weight: 900; letter-spacing: -2px; line-height: 1; }
        .unit { font-size: 1rem; color: var(--gray); margin-left: 5px; vertical-align: middle; }
        .update-btn { background: transparent; color: #444; border: 1px solid #222; padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 0.7rem; transition: 0.3s; margin-top: 25px; }
        .update-btn:hover { color: #fff; border-color: #fff; }

        .board { width: 100%; max-width: 380px; background: #0a0a0a; border: 1px solid #1a1a1a; padding: 25px; border-radius: 20px; margin-bottom: 25px; box-sizing: border-box; }
        h3 { margin: 0 0 20px 0; font-size: 0.9rem; font-weight: 600; color: #eee; display: flex; justify-content: space-between; align-items: center; }
        
        #manual-form { display: none; flex-direction: column; gap: 10px; margin-bottom: 20px; padding: 15px; background: #111; border-radius: 12px; border: 1px solid #222; animation: fadeIn 0.3s ease; }
        #manual-form input { background: #000; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 8px; font-size: 0.85rem; }
        .form-btns { display: flex; gap: 8px; }
        .confirm-btn { background: #fff; color: #000; border: none; flex: 2; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .cancel-btn { background: #333; color: #fff; border: none; flex: 1; padding: 10px; border-radius: 8px; cursor: pointer; }
        
        .open-form-btn { font-size: 0.65rem; color: var(--gray); border: 1px solid #222; padding: 4px 8px; border-radius: 10px; cursor: pointer; background: transparent; }

        #history-list, #msg-list { list-style: none; padding: 0; margin: 0; font-size: 0.85rem; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #1a1a1a; }
        .item:last-child { border: none; }
        .del-btn { background: transparent; color: #333; border: none; cursor: pointer; font-size: 0.7rem; margin-left: 10px; }

        #view-more-btn { width: 100%; padding: 15px 0 5px 0; background: transparent; border: none; color: #444; font-size: 0.75rem; cursor: pointer; text-decoration: underline; text-underline-offset: 4px; display: none; }
        #view-more-btn:hover { color: #fff; }

        .input-box { display: flex; gap: 8px; margin-top: 15px; }
        .input-box input { background: #1a1a1a; border: none; color: #fff; padding: 12px; border-radius: 10px; flex-grow: 1; font-size: 0.85rem; }
        .send-btn { background: #fff; border: none; padding: 0 15px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 0.85rem; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="logo-wrapper"><img src="논산스 로고(배경O).png" alt="NONSANS"></div>
    <div class="milestone-title">NONSANS MAGAZINE</div>

    <div class="counter-section">
        <div><span id="display-count">0</span><span class="unit">FOLLOWERS</span></div>
        <button class="update-btn" onclick="updateFollower()">UPDATE COUNT</button>
    </div>

    <div class="board">
        <h3>ARCHIVE <button class="open-form-btn" onclick="toggleForm()">+ 기록 추가하기</button></h3>
        <div id="manual-form">
            <input type="date" id="pastDate">
            <input type="number" id="pastCount" placeholder="달성 팔로워 수">
            <div class="form-btns">
                <button class="confirm-btn" onclick="addPastHistory()">추가</button>
                <button class="cancel-btn" onclick="toggleForm()">취소</button>
            </div>
        </div>
        <ul id="history-list"></ul>
        <button id="view-more-btn" onclick="toggleHistoryView()">View More ↓</button>
    </div>

    <div class="board">
        <h3>EDITORS' NOTE</h3>
        <ul id="msg-list"></ul>
        <div class="input-box">
            <input type="text" id="msgInput" placeholder="Write a message...">
            <button class="send-btn" onclick="addNote()">SEND</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBcSvwFrptTwoorfcYwW1Hamkquecn-TYw",
            authDomain: "nonsans-20612.firebaseapp.com",
            databaseURL: "https://nonsans-20612-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "nonsans-20612",
            storageBucket: "nonsans-20612.appspot.com",
            messagingSenderId: "289009096287",
            appId: "1:289009096287:web:fed7ca8fdc7d16454dedea"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentCount = 0;
        let allHistoryItems = [];
        let isShowingAll = false;

        db.ref('followerCount').on('value', (snap) => {
            currentCount = snap.val() || 0;
            document.getElementById('display-count').innerText = currentCount.toLocaleString();
        });

        db.ref('history').orderByChild('date').on('value', (snap) => {
            allHistoryItems = [];
            snap.forEach((child) => { allHistoryItems.push({ key: child.key, ...child.val() }); });
            allHistoryItems.reverse();
            renderHistory();
        });

        function renderHistory() {
            const list = document.getElementById('history-list');
            const viewMoreBtn = document.getElementById('view-more-btn');
            list.innerHTML = '';

            // [수정] 10개에서 7개로 변경
            const displayItems = isShowingAll ? allHistoryItems : allHistoryItems.slice(0, 7);

            displayItems.forEach((data) => {
                const li = document.createElement('li');
                li.className = 'item';
                li.innerHTML = `<div><span>${data.count.toLocaleString()} Followers</span><span style="color:#444; margin-left:10px;">${data.date}</span></div><button class="del-btn" onclick="deleteItem('history', '${data.key}')">삭제</button>`;
                list.appendChild(li);
            });

            // [수정] 7개보다 많을 때만 버튼 표시
            if (allHistoryItems.length > 7) {
                viewMoreBtn.style.display = 'block';
                viewMoreBtn.innerText = isShowingAll ? "Close ↑" : "View More ↓";
            } else {
                viewMoreBtn.style.display = 'none';
            }
        }

        function toggleHistoryView() {
            isShowingAll = !isShowingAll;
            renderHistory();
        }

        db.ref('notes').on('value', (snap) => {
            const list = document.getElementById('msg-list');
            list.innerHTML = '';
            snap.forEach((child) => {
                const li = document.createElement('li');
                li.className = 'item';
                li.innerHTML = `<span>${child.val().text}</span><button class="del-btn" onclick="deleteItem('notes', '${child.key}')">삭제</button>`;
                list.prepend(li);
            });
        });

        function toggleForm() {
            const form = document.getElementById('manual-form');
            form.style.display = (form.style.display === 'flex') ? 'none' : 'flex';
        }

        function updateFollower() {
            const val = prompt("현재 팔로워 수를 입력하세요.");
            if (val && !isNaN(val)) {
                const newCount = parseInt(val);
                if (Math.floor(newCount / 100) > Math.floor(currentCount / 100)) {
                    const now = new Date();
                    const dateStr = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;
                    db.ref('history').push({ count: newCount, date: dateStr });
                    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                }
                db.ref('followerCount').set(newCount);
            }
        }

        function addPastHistory() {
            const dateInput = document.getElementById('pastDate').value;
            const countInput = document.getElementById('pastCount').value;
            if (!dateInput || !countInput) { alert("날짜와 팔로워 수를 모두 입력해주세요!"); return; }
            const formattedDate = dateInput.replace(/-/g, '.');
            db.ref('history').push({ count: parseInt(countInput), date: formattedDate });
            document.getElementById('pastCount').value = '';
            toggleForm();
        }

        function addNote() {
            const input = document.getElementById('msgInput');
            if (!input.value) return;
            db.ref('notes').push({ text: input.value });
            input.value = "";
        }

        function deleteItem(path, key) {
            if (confirm("정말로 삭제하시겠습니까?")) { db.ref(`${path}/${key}`).remove(); }
        }
    </script>
</body>
</html>
